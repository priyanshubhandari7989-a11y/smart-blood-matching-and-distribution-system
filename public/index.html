<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Blood Matching System</title>
</head>
<body>
    <div class="container">
        <h1>🩸 Blood Matching System</h1>
        <form id="matchForm">
            <div class="form-group">
                <label for="name">Patient Name</label>
                <input type="text" id="name" name="name" placeholder="Enter patient name" required>
            </div>
            <div class="form-group">
                <label for="blood">Blood Type</label>
                <select id="blood" name="blood" required>
                    <option value="">Select blood type</option>
                    <option value="A+">A+</option>
                    <option value="A-">A-</option>
                    <option value="B+">B+</option>
                    <option value="B-">B-</option>
                    <option value="AB+">AB+</option>
                    <option value="AB-">AB-</option>
                    <option value="O+">O+</option>
                    <option value="O-">O-</option>
                </select>
            </div>
            <div class="form-group">
                <label for="location">Location</label>
                <input type="text" id="location" name="location" placeholder="Enter location" required>
            </div>
            <div class="form-group">
                <label for="urgency">Urgency Level (1-10)</label>
                <input type="number" id="urgency" name="urgency" min="1" max="10" placeholder="Enter urgency level" required>
            </div>
            <button type="submit" class="btn-find">Find Donor</button>
        </form>
        <div id="result" class="result-box" style="display:none;"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
